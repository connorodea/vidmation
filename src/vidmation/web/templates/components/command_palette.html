{# Command Palette (Cmd+K) #}
<div x-data="commandPalette()"
     @keydown.window="handleGlobalKeydown($event)"
     @toggle-command-palette.window="toggle()"
     x-show="open"
     x-cloak
     class="fixed inset-0 z-[90] flex items-start justify-center pt-[20vh]"
     role="dialog"
     aria-modal="true"
     aria-label="Command palette">

  <div @click="close()"
       x-show="open"
       x-transition:enter="transition ease-out duration-150"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-100"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       class="fixed inset-0 command-palette-backdrop">
  </div>

  <div x-show="open"
       x-transition:enter="transition ease-out duration-150"
       x-transition:enter-start="opacity-0 scale-95"
       x-transition:enter-end="opacity-100 scale-100"
       x-transition:leave="transition ease-in duration-100"
       x-transition:leave-start="opacity-100 scale-100"
       x-transition:leave-end="opacity-0 scale-95"
       class="relative w-full max-w-lg rounded-2xl bg-[#1a1a1a] border border-white/[0.08] shadow-2xl shadow-black/50 overflow-hidden"
       @keydown.escape.prevent="close()"
       @keydown.arrow-down.prevent="moveSelection(1)"
       @keydown.arrow-up.prevent="moveSelection(-1)"
       @keydown.enter.prevent="executeSelected()">

    <div class="flex items-center gap-3 px-5 border-b border-white/[0.06]">
      <svg class="w-4 h-4 text-[#666] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input x-ref="searchInput"
             x-model="query"
             @input="search()"
             type="text"
             placeholder="Search or type a command..."
             class="flex-1 bg-transparent py-3.5 text-sm text-[#ececec] placeholder-[#666] focus:outline-none"
             autocomplete="off"
             aria-label="Search">
      <kbd class="hidden sm:inline-flex items-center rounded bg-white/[0.06] px-1.5 py-0.5 text-[10px] font-medium text-[#666]">ESC</kbd>
    </div>

    <div class="max-h-72 overflow-y-auto py-1.5">
      <template x-if="query.length === 0">
        <div>
          <div class="px-4 py-1.5"><p class="text-[10px] font-medium text-[#666] uppercase tracking-wider">Quick Actions</p></div>
          <template x-for="(action, index) in quickActions" :key="action.id">
            <button @click="executeAction(action)" @mouseenter="selectedIndex = index"
                    class="w-full flex items-center gap-3 px-5 py-2 text-sm transition-colors"
                    :class="selectedIndex === index ? 'bg-white/[0.06] text-white' : 'text-[#999]'"
                    role="option" :aria-selected="selectedIndex === index">
              <div class="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0" :class="action.iconBg"><span x-html="action.icon"></span></div>
              <div class="flex-1 text-left"><span class="font-medium text-sm" x-text="action.label"></span><span class="ml-2 text-xs text-[#666]" x-text="action.hint"></span></div>
            </button>
          </template>
          <div class="px-4 py-1.5 mt-1 border-t border-white/[0.04]"><p class="text-[10px] font-medium text-[#666] uppercase tracking-wider">Recent</p></div>
          <template x-for="(item, index) in recentItems" :key="'recent-' + item.id">
            <button @click="navigateTo(item.url)" @mouseenter="selectedIndex = quickActions.length + index"
                    class="w-full flex items-center gap-3 px-5 py-2 text-sm transition-colors"
                    :class="selectedIndex === (quickActions.length + index) ? 'bg-white/[0.06] text-white' : 'text-[#999]'">
              <div class="w-7 h-7 rounded-lg bg-white/[0.04] flex items-center justify-center flex-shrink-0"><span x-html="item.icon"></span></div>
              <span class="flex-1 text-left" x-text="item.label"></span>
              <span class="text-xs text-[#666]" x-text="item.type"></span>
            </button>
          </template>
        </div>
      </template>

      <template x-if="query.length > 0 && results.length > 0">
        <div>
          <template x-for="(group, groupIdx) in groupedResults" :key="group.label">
            <div>
              <div class="px-4 py-1.5"><p class="text-[10px] font-medium text-[#666] uppercase tracking-wider" x-text="group.label"></p></div>
              <template x-for="(item, itemIdx) in group.items" :key="item.id">
                <button @click="navigateTo(item.url)" @mouseenter="selectedIndex = item._flatIndex"
                        class="w-full flex items-center gap-3 px-5 py-2 text-sm transition-colors"
                        :class="selectedIndex === item._flatIndex ? 'bg-white/[0.06] text-white' : 'text-[#999]'">
                  <div class="w-7 h-7 rounded-lg bg-white/[0.04] flex items-center justify-center flex-shrink-0"><span x-html="item.icon"></span></div>
                  <span class="flex-1 text-left truncate" x-text="item.label"></span>
                  <span class="text-xs text-[#666]" x-text="item.meta"></span>
                </button>
              </template>
            </div>
          </template>
        </div>
      </template>

      <template x-if="query.length > 0 && results.length === 0">
        <div class="px-5 py-8 text-center">
          <p class="text-sm text-[#666]">No results for "<span x-text="query" class="text-[#999]"></span>"</p>
        </div>
      </template>
    </div>

    <div class="flex items-center justify-between px-5 py-2 border-t border-white/[0.06] text-[10px] text-[#666]">
      <div class="flex items-center gap-3">
        <span class="flex items-center gap-1"><kbd class="bg-white/[0.06] px-1 py-0.5 rounded">&uarr;</kbd><kbd class="bg-white/[0.06] px-1 py-0.5 rounded">&darr;</kbd> navigate</span>
        <span class="flex items-center gap-1"><kbd class="bg-white/[0.06] px-1.5 py-0.5 rounded">&crarr;</kbd> select</span>
      </div>
      <span class="flex items-center gap-1"><kbd class="bg-white/[0.06] px-1.5 py-0.5 rounded">esc</kbd> close</span>
    </div>
  </div>
</div>

<script>
function commandPalette() {
  const iconSvg = (d) => `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="${d}"/></svg>`;
  const plusIcon = iconSvg('M12 4v16m8-8H4');
  const chartIcon = iconSvg('M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z');
  const videoIcon = iconSvg('M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z');
  const jobIcon = iconSvg('M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15');
  const pageIcon = iconSvg('M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z');

  return {
    open: false, query: '', selectedIndex: 0, results: [],
    quickActions: [
      { id: 'new-video', label: 'New Video', hint: 'Generate with AI', icon: plusIcon, iconBg: 'bg-[#10a37f]/15 text-[#10a37f]', url: '/videos/new' },
      { id: 'analytics', label: 'Analytics', hint: 'Costs & performance', icon: chartIcon, iconBg: 'bg-[#10a37f]/15 text-[#10a37f]', url: '/analytics' },
      { id: 'jobs', label: 'Active Jobs', hint: 'Monitor progress', icon: jobIcon, iconBg: 'bg-[#f59e0b]/15 text-[#f59e0b]', url: '/jobs?status=running' },
    ],
    recentItems: [
      { id: 'r1', label: 'Dashboard', icon: iconSvg('M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6'), url: '/', type: 'Page' },
      { id: 'r2', label: 'Videos', icon: videoIcon, url: '/videos', type: 'Page' },
      { id: 'r3', label: 'Channels', icon: iconSvg('M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10'), url: '/channels', type: 'Page' },
    ],
    get groupedResults() { const g = {}; let f = 0; this.results.forEach(i => { if (!g[i.group]) g[i.group] = { label: i.group, items: [] }; i._flatIndex = f++; g[i.group].items.push(i); }); return Object.values(g); },
    get totalItems() { return this.query.length === 0 ? this.quickActions.length + this.recentItems.length : this.results.length; },
    handleGlobalKeydown(e) { if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); this.toggle(); } },
    toggle() { this.open = !this.open; if (this.open) { this.query = ''; this.selectedIndex = 0; this.results = []; this.$nextTick(() => this.$refs.searchInput?.focus()); } },
    close() { this.open = false; this.query = ''; },
    moveSelection(d) { const t = this.totalItems; if (t === 0) return; this.selectedIndex = (this.selectedIndex + d + t) % t; },
    executeSelected() { if (this.query.length === 0) { if (this.selectedIndex < this.quickActions.length) this.executeAction(this.quickActions[this.selectedIndex]); else { const r = this.selectedIndex - this.quickActions.length; if (this.recentItems[r]) this.navigateTo(this.recentItems[r].url); } } else { const i = this.results.find(r => r._flatIndex === this.selectedIndex); if (i) this.navigateTo(i.url); } },
    executeAction(a) { this.close(); window.location.href = a.url; },
    navigateTo(u) { this.close(); window.location.href = u; },
    async search() {
      if (this.query.length === 0) { this.results = []; this.selectedIndex = 0; return; }
      this.selectedIndex = 0; const q = this.query.toLowerCase();
      const a = this.quickActions.filter(a => a.label.toLowerCase().includes(q) || a.hint.toLowerCase().includes(q)).map(a => ({ id: 'a-' + a.id, label: a.label, icon: a.icon, url: a.url, meta: a.hint, group: 'Actions' }));
      const p = [{ label: 'Dashboard', url: '/' },{ label: 'Videos', url: '/videos' },{ label: 'New Video', url: '/videos/new' },{ label: 'Channels', url: '/channels' },{ label: 'Jobs', url: '/jobs' },{ label: 'Analytics', url: '/analytics' }].filter(p => p.label.toLowerCase().includes(q)).map(p => ({ ...p, id: 'p-' + p.label, icon: pageIcon, meta: 'Page', group: 'Pages' }));
      this.results = [...a, ...p];
    }
  };
}
</script>
