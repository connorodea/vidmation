{% extends "base.html" %}
{% block title %}New Channel - VIDMATION{% endblock %}
{% block nav_channels %}bg-gray-800 text-white{% endblock %}

{% block content %}
<div class="max-w-lg space-y-6">
    <h1 class="text-2xl font-bold tracking-tight">Add Channel</h1>

    <form method="post" action="/channels/new" class="space-y-5">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-300 mb-2">Channel Name</label>
            <input type="text" id="name" name="name" required
                   placeholder="e.g., Mindful Moments"
                   class="w-full rounded-lg bg-gray-900 border border-gray-700 px-4 py-3 text-white placeholder-gray-500 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 focus:outline-none">
        </div>

        <div>
            <label for="profile_path" class="block text-sm font-medium text-gray-300 mb-2">Channel Profile</label>
            <input type="text" id="profile_path" name="profile_path"
                   value="channel_profiles/default.yml"
                   class="w-full rounded-lg bg-gray-900 border border-gray-700 px-4 py-3 text-white focus:border-brand-500 focus:ring-1 focus:ring-brand-500 focus:outline-none">
            <p class="mt-1 text-xs text-gray-500">Path to YAML profile file</p>
        </div>

        <div class="flex gap-3">
            <button type="submit" class="flex-1 rounded-lg bg-brand-600 px-6 py-3 text-sm font-medium text-white hover:bg-brand-700">Create Channel</button>
            <a href="/channels" class="rounded-lg border border-gray-700 px-6 py-3 text-sm font-medium text-gray-300 hover:bg-gray-800">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
