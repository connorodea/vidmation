<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect width="120" height="120" rx="28" fill="url(#gradient)"/>

  <!-- "Ai" text -->
  <text x="60" y="78" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="800" font-size="58" fill="white" letter-spacing="-2">Ai</text>

  <!-- Subtle inner glow -->
  <rect width="120" height="120" rx="28" fill="url(#innerGlow)"/>

  <defs>
    <!-- Green gradient -->
    <linearGradient id="gradient" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10a37f"/>
      <stop offset="100%" stop-color="#0d8c6d"/>
    </linearGradient>

    <!-- Subtle top-left highlight -->
    <radialGradient id="innerGlow" cx="30%" cy="25%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
