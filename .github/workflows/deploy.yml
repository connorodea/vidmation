name: Deploy VIDMATION

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/

      - name: Run tests
        run: pytest tests/ -v --tb=short

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets
        id: server
        run: |
          if [[ -z "${{ secrets.HETZNER_CO_HOST }}" ]]; then
            echo "::warning::Deploy secrets not configured — skipping deployment"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "host=${{ secrets.HETZNER_CO_HOST }}" >> $GITHUB_OUTPUT
          echo "user=${{ secrets.HETZNER_CO_USER }}" >> $GITHUB_OUTPUT
          echo "port=${{ secrets.HETZNER_CO_PORT }}" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Deploy via rsync
        if: steps.server.outputs.skip != 'true'
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.env' --exclude='data/' --exclude='output/' --exclude='*.pyc' --exclude='__pycache__' --exclude='.git' --exclude='node_modules'
          path: ./
          remote_path: /var/www/vidmation/
          remote_host: ${{ steps.server.outputs.host }}
          remote_user: ${{ steps.server.outputs.user }}
          remote_key: ${{ secrets.HETZNER_CO_SSH_KEY }}
          remote_port: ${{ steps.server.outputs.port || 22 }}

      - name: Run deploy script
        if: steps.server.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.server.outputs.host }}
          username: ${{ steps.server.outputs.user }}
          key: ${{ secrets.HETZNER_CO_SSH_KEY }}
          port: ${{ steps.server.outputs.port || 22 }}
          script: |
            cd /var/www/vidmation
            bash deploy/deploy.sh
